<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Cursor</title>

   <style>
     body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ffffff;
        }

        .card {
            background: #1c1c1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: #8e8e93;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 980px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #e5e5ea;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }
   </style>
  
    <style>
        /* need this to work */
        * {
            cursor: none !important;
        }

        .custom-cursor {
            width: 44px;
            height: 44px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(50, 50, 50, 0.05);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s ease-out;
        }

        .custom-cursor.clicking {
            transform: translate(-50%, -50%) scale(0.85);
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Test Card</h1>
        <p>This page now uses the exact styles from your project. Move your mouse to see the custom white cursor.</p>
        <button onclick="alert('Click works through the cursor!')">Click Me</button>
    </div>

   /* need this to work */
    <script>
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        document.body.appendChild(cursor);

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
        });

        document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
    </script>
</body>

</html>
